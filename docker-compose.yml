services:
  db:
    image: mysql:8.4
    container_name: contactflow_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: contactflow
      MYSQL_USER: django
      MYSQL_PASSWORD: django_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3334:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: contactflow_web
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8035:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  node:
    image: node:22-alpine
    container_name: contactflow_tailwind
    working_dir: /app
    command: sh -c "npm install && npm run dev:css"
    volumes:
      - .:/app

volumes:
  mysql_data: